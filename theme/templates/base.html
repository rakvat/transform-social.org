<!DOCTYPE html>
<html lang="en">
  <head>
    {% set base_url %}https://transform-social.org/{% endset %}
    <title>{% block title %}Transform Social{% endblock %}</title>
    <link rel="stylesheet" href="/css/styles.css" media="screen">
    <link rel="canonical" href="{% block url %}{{base_url}}{% endblock %}" />

    <meta http-equiv="Content-Type" content="text/html;charset=utf-8" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="Title" content="{{self.title()}}">
    <meta name="Description" content="{% block description %}Kitik am bestehenden Gesellschaftssystem, Ideen für freiere und solidarischere Gesellschaftssysteme und Gedanken über die Wege in diese Gesellschaftssysteme.{% endblock %}">
    <meta charset="utf-8">
    <meta name="Revisit" content="After 15 days">
    <meta name="Keywords" content="Transformation, anarchistische Gesellschaften, Anarchie, Solidarit&auml;t, Freiheit, Utopie, Social Transformation, transform social, anarchy">
    <meta name="Robots" content="INDEX,FOLLOW">
    <meta name="content-language" content="de,en">
    <meta property="og:url" content="{{ self.url() }}" />
    <meta property="og:type" content="article" />
    <meta property="og:title" content="{{ self.title() }}"/>
    <meta property="og:description" content="{{self.description()}}" />
    <meta property="og:image" content="{{base_url}}{% block image %}images/logo.png{% endblock %}" />
    <link rel="icon" href="/favicon.ico?v=3" sizes="16x16 32x32 48x48 64x64 128x128" type="image/vnd.microsoft.icon">
  </head>
    <body text="#FFFFFF" bgcolor="#000000" onLoad="if (self != top) top.location = self.location">
      <nav class="navbar navbar-default navbar-fixed-top">
        <div class="container">
          <div class="navbar-header">
            <a href="/" class="navbar-brand">Transformation</a>
            <button class="navbar-toggle" type="button" data-toggle="collapse" data-target="#navbar-main">
              <span class="icon-bar"></span>
              <span class="icon-bar"></span>
              <span class="icon-bar"></span>
            </button>
          </div>
          <div class="navbar-collapse collapse" id="navbar-main">
            <ul class="nav navbar-nav">
              {% set page_slug %}
                {% block slug %}{% endblock %}
              {% endset %}
              <li>
                <a href="/wasistdas" {% if page_slug == 'wasistdas' %}class="active"{% endif %}" >Was ist das?</a>
              </li>
              <li>
                <a href="/texte" {% if page_slug == 'texte' %}class="active"{% endif %}>Texte</a>
              </li>
              <li>
                <a href="/bibliothek" {% if page_slug == 'bibliothek' %}class="active"{% endif %}>Bibliothek</a>
              </li>
              <li>
                <a href="/links" {% if page_slug == 'links' %}class="active"{% endif %}>Links</a>
              </li>
            </ul>

            <ul class="nav navbar-nav navbar-right">
              <li>
                <a rel="license" href="https://creativecommons.org/licenses/by-nc/3.0/de/" target="_blank">
                  <img alt="Creative Commons License" style="border-width:0" src="/images/cc_licence.png" />
                </a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
      <div class="container">
        <div class="row">
          <div class="col-lg-3 col-md-2 col-xs-0">
          </div>
          <div class="col-lg-6 col-md-8 col-xs-12">
            <br>
            <br>
            <br>
            {% block content %}{% endblock %}
          </div>
          <div class="col-lg-3 col-md-2 col-xs-0">
          </div>
        </div>
      </div>
      <script src="/javascript/bootstrap-native-v4.js"></script>
      <script src="/javascript/polyfill.js"></script>
    </body>
</html>
